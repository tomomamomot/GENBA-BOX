<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">NINQ logo</title>
  <desc id="desc">A rounded app icon with a calendar grid, connected day and night bands, and the NINQ wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102A43"/>
      <stop offset="1" stop-color="#1A4FA0"/>
    </linearGradient>
    <linearGradient id="day" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFD166"/>
      <stop offset="1" stop-color="#F4B942"/>
    </linearGradient>
    <linearGradient id="night" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C6FD0"/>
      <stop offset="1" stop-color="#5B5FC7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#061526" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="72" y="92" width="368" height="292" rx="34" fill="#F8FBFF"/>
    <rect x="72" y="92" width="368" height="62" rx="34" fill="#E9F0F8"/>
    <path d="M72 154h368" stroke="#D4E0EC" stroke-width="6"/>
    <path d="M72 218h368M72 282h368M72 346h368" stroke="#DDE6EF" stroke-width="4"/>
    <path d="M145 154v230M219 154v230M293 154v230M367 154v230" stroke="#E2EAF2" stroke-width="4"/>
    <rect x="96" y="184" width="224" height="42" rx="14" fill="url(#day)"/>
    <rect x="96" y="238" width="320" height="42" rx="14" fill="url(#night)"/>
    <path d="M130 356V266l72 90v-90" fill="none" stroke="#102A43" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="256" y="446" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="900" letter-spacing="8" fill="#FFFFFF">NINQ</text>
</svg>
