<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">NINQ app icon</title>
  <desc id="desc">A minimal dark app icon with a bold N mark and a small accent square.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080C12"/>
      <stop offset="1" stop-color="#142235"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD166"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect x="22" y="22" width="468" height="468" rx="104" fill="#FFFFFF" opacity="0.045"/>
  <rect x="34" y="34" width="444" height="444" rx="92" fill="#000000" opacity="0.10"/>
  <g filter="url(#softShadow)">
    <path d="M210 132 L302 380" stroke="url(#accent)" stroke-width="70" stroke-linecap="round"/>
    <rect x="134" y="122" width="62" height="268" rx="24" fill="#F8FAFC"/>
    <rect x="316" y="122" width="62" height="268" rx="24" fill="#F8FAFC"/>
    <rect x="340" y="344" width="54" height="54" rx="18" fill="#38BDF8"/>
    <rect x="356" y="360" width="22" height="22" rx="8" fill="#080C12"/>
  </g>
</svg>
