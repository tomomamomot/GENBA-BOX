<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GENBA BOX">
<meta name="theme-color" content="#1a4fa0">
<title>GENBA BOX</title>
<link rel="manifest" href="manifest.json?v=16">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="styles.css?v=20">
</head>
<body>
<div id="sc-cal" class="screen active">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="topbar-title">GENBA BOX</div>
        <div class="topbar-sub" id="cal-sub"></div>
      </div>
      <div class="topbar-actions">
        <button class="ghost-icon-btn" id="menu-toggle-btn" aria-label="メニュー">☰</button>
      </div>
    </div>
    <div class="top-menu hidden" id="top-menu">
      <button class="top-menu-item" data-screen-link="cal">カレンダー</button>
      <button class="top-menu-item" data-screen-link="sub">外注</button>
      <button class="top-menu-item" data-screen-link="inv">請求</button>
      <button class="top-menu-item" data-screen-link="sync">Google同期</button>
      <button class="top-menu-item" data-screen-link="receipt">領収書</button>
      <button class="top-menu-item" data-screen-link="st">設定</button>
      <button class="top-menu-item" id="toggle-sales-btn">売上表示</button>
    </div>
  </div>
  <div class="month-nav">
    <button id="prev-month-btn" aria-label="前月">&#8249;</button>
    <span class="month-label" id="cal-mnav"></span>
    <button id="next-month-btn" aria-label="次月">&#8250;</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div id="day-entries" class="hidden"></div>
  <div class="sum-grid" id="sum-grid"></div>
  <button class="fab" id="fab-main" aria-label="追加">＋</button>
</div>

<div id="sc-sub" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="topbar-title">外注管理</div>
        <div class="topbar-sub" id="sub-sub"></div>
      </div>
      <div class="topbar-actions">
        <button class="ghost-icon-btn" data-menu-open aria-label="メニュー">☰</button>
      </div>
    </div>
    <div class="top-menu hidden top-menu-clone"></div>
  </div>
  <div class="month-nav">
    <button id="sub-prev-month-btn">&#8249;</button>
    <span class="month-label" id="sub-mnav"></span>
    <button id="sub-next-month-btn">&#8250;</button>
  </div>
  <div id="sub-body"></div>
  <button class="fab" id="fab-sub" aria-label="外注追加">＋</button>
</div>

<div id="sc-inv" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="topbar-title">出面表・請求書</div>
        <div class="topbar-sub" id="inv-sub"></div>
      </div>
      <div class="topbar-actions">
        <button class="ghost-icon-btn" data-menu-open aria-label="メニュー">☰</button>
      </div>
    </div>
    <div class="top-menu hidden top-menu-clone"></div>
  </div>
  <div class="month-nav">
    <button id="inv-prev-month-btn">&#8249;</button>
    <span class="month-label" id="inv-mnav"></span>
    <button id="inv-next-month-btn">&#8250;</button>
  </div>
  <div class="inline-head">会社を選択</div>
  <div class="co-tabs" id="co-tabs"></div>
  <div id="inv-body"></div>
</div>

<div id="sc-st" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="topbar-title">設定</div>
      </div>
      <div class="topbar-actions">
        <button class="ghost-icon-btn" data-menu-open aria-label="メニュー">☰</button>
      </div>
    </div>
    <div class="top-menu hidden top-menu-clone"></div>
  </div>

  <div class="sec-hd">登録会社・単価</div>
  <div class="st-section wide-section">
    <div class="field pad-field">
      <label>会社名と単価</label>
      <div class="company-rate-add">
        <input id="st-company-new" class="st-input" placeholder="会社名を入力">
        <input id="st-company-day-new" class="st-input" type="number" inputmode="numeric" placeholder="日勤単価">
        <input id="st-company-night-new" class="st-input" type="number" inputmode="numeric" placeholder="夜勤単価">
        <input id="st-company-ot-new" class="st-input" type="number" inputmode="numeric" placeholder="残業単価">
        <button class="mini-add-btn" type="button" id="add-company-btn">追加</button>
      </div>
      <div class="company-rate-list" id="st-company-list"></div>
      <textarea id="st-companies" class="hidden"></textarea>
      <textarea id="st-company-presets" class="hidden"></textarea>
    </div>
  </div>

  <div class="sec-hd">経費項目</div>
  <div class="st-section wide-section">
    <div class="field pad-field">
      <label>経費項目</label>
      <div class="inline-add"><input id="st-expense-new" class="st-input" placeholder="項目名を入力"><button class="mini-add-btn" type="button" id="add-expense-btn">追加</button></div>
      <div class="setting-chip-list" id="st-expense-list"></div>
      <textarea id="st-expenses" class="hidden"></textarea>
    </div>
  </div>

  <div class="sec-hd">自分の情報</div>
  <div class="st-section">
    <div class="st-row"><span class="st-label">氏名 / 屋号</span><input class="st-input" id="st-name" placeholder="山田職人"></div>
    <div class="st-row"><span class="st-label">住所</span><input class="st-input" id="st-addr" placeholder="埼玉県..." ></div>
    <div class="st-row"><span class="st-label">電話番号</span><input class="st-input" id="st-tel" placeholder="090-0000-0000"></div>
    <div class="st-row"><span class="st-label">会社名</span><input class="st-input" id="st-co" placeholder="株式会社○○"></div>
  </div>

  <div class="sec-hd">振込先口座</div>
  <div class="st-section">
    <div class="st-row"><span class="st-label">銀行名</span><input class="st-input" id="st-bank" placeholder="楽天銀行"></div>
    <div class="st-row"><span class="st-label">支店名</span><input class="st-input" id="st-branch" placeholder="第四営業支店"></div>
    <div class="st-row"><span class="st-label">口座番号</span><input class="st-input" id="st-accno" placeholder="普通 1234567"></div>
    <div class="st-row"><span class="st-label">口座名義</span><input class="st-input" id="st-accname" placeholder="カ）○○"></div>
  </div>

  <div class="sec-hd">表示設定</div>
  <div class="st-section">
    <div class="st-row"><span class="st-label">外注機能</span><button class="toggle on" id="tgl-subcontract" type="button"></button></div>
  </div>

  <div class="sec-hd">請求設定</div>
  <div class="st-section">
    <div class="st-row"><span class="st-label">インボイス表示</span><button class="toggle on" id="tgl-inv"></button></div>
    <div class="st-row" id="inv-no-row"><span class="st-label">登録番号</span><input class="st-input" id="st-invno" placeholder="T0000000000000"></div>
    <div class="st-row"><span class="st-label">消費税率</span><select class="st-select" id="st-tax"><option value="10">10%</option><option value="8">8%</option><option value="0">0%</option></select></div>
  </div>

  <div class="save-wrap">
    <button class="btn-primary" id="save-settings-btn">設定を保存</button>
    <div class="save-status" id="save-status" aria-live="polite"></div>
  </div>
</div>



<div id="sc-sync" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="topbar-title">Google同期</div>
        <div class="topbar-sub" id="sync-sub">出力と引き継ぎ</div>
      </div>
      <div class="topbar-actions">
        <button class="ghost-icon-btn" data-menu-open aria-label="メニュー">&#9776;</button>
      </div>
    </div>
    <div class="top-menu hidden top-menu-clone"></div>
  </div>
  <div class="sync-panel">
    <div class="sync-section">
      <div class="sync-section-head">
        <div>
          <div class="sync-section-title">Googleカレンダー出力</div>
          <div class="sync-section-sub">予定をカレンダーに入れる</div>
        </div>
        <span id="calendar-export-count">0件</span>
      </div>
      <div class="sync-actions two">
        <button class="btn-primary" type="button" id="google-export-month-btn">今月分を出力</button>
        <button class="btn-secondary" type="button" id="google-open-selected-day-btn">選択日を開く</button>
      </div>
    </div>

    <div class="sync-section">
      <div class="sync-section-head">
        <div>
          <div class="sync-section-title">データ引き継ぎ</div>
          <div class="sync-section-sub">スマホ変更・別端末用</div>
        </div>
        <span id="backup-status">この端末</span>
      </div>
      <div class="sync-actions two">
        <button class="btn-secondary" type="button" id="backup-export-btn">データを書き出し</button>
        <button class="btn-secondary" type="button" id="backup-import-btn">データを読み込み</button>
        <input id="backup-file" type="file" accept="application/json,.json" hidden>
      </div>
    </div>
    <div class="sync-log" id="sync-log"></div>
  </div>
</div>

<div id="sc-receipt" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="topbar-title">領収書</div>
        <div class="topbar-sub" id="receipt-sub">自動仕分け</div>
      </div>
      <div class="topbar-actions">
        <button class="ghost-icon-btn" data-menu-open aria-label="メニュー">&#9776;</button>
      </div>
    </div>
    <div class="top-menu hidden top-menu-clone"></div>
  </div>
  <div class="receipt-import">
    <input id="receipt-file" type="file" accept="image/*,.pdf" multiple hidden>
    <button class="btn-primary" type="button" id="receipt-pick-btn">領収書を読み込み</button>
  </div>
  <div class="receipt-summary">
    <div class="sync-section-head">
      <div>
        <div class="sync-section-title">経費別集計</div>
        <div class="sync-section-sub">今月と今年</div>
      </div>
      <span id="receipt-expense-total">¥0</span>
    </div>
    <div id="receipt-expense-summary-body"></div>
  </div>
  <div id="receipt-body"></div>
</div>

<nav class="nav hidden">
  <button class="nav-item active" data-screen="cal">カレンダー</button>
  <button class="nav-item" data-screen="sub">外注</button>
  <button class="nav-item" data-screen="inv">請求</button>
  <button class="nav-item" data-screen="sync">Google同期</button>
  <button class="nav-item" data-screen="receipt">領収書</button>
  <button class="nav-item" data-screen="st">設定</button>
</nav>

<div class="day-modal-bg" id="day-modal-bg">
  <div class="day-modal">
    <div class="day-modal-head">
      <div class="day-modal-title" id="day-modal-title">予定</div>
      <button class="day-modal-close" type="button" data-close-day-modal aria-label="閉じる">×</button>
    </div>
    <div class="day-modal-body" id="day-modal-body"></div>
  </div>
</div>
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="entry-modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">予定を追加</div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="app.js?v=20"></script>
</body>
</html>
